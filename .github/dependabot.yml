version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
        exclude-patterns:
          - "ty"
      ty-beta:
        applies-to: "version-updates"
        patterns:
          - "ty"
      python-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        applies-to: "version-updates"
        patterns:
          - "*"
      github-actions-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "America/Los_Angeles"
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-images:
        applies-to: "version-updates"
        patterns:
          - "*"
      docker-security:
        applies-to: "security-updates"
        patterns:
          - "*"
