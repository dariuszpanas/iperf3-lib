name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Project version to publish to TestPyPI (for example, 0.2.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.release-version.outputs.version }}
      prerelease: ${{ steps.release-version.outputs.prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Validate release version
        id: release-version
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          uv run --no-project --python 3.12 python scripts/validate_release.py \
            --tag "$RELEASE_TAG" \
            --requested-version "$REQUESTED_VERSION" \
            --github-output "$GITHUB_OUTPUT"

      - name: Build wheel and source distribution
        run: uv build --no-sources

      - name: Validate distribution metadata
        run: uv run --frozen --no-dev --group release twine check dist/*

      - name: Validate wheel contents
        run: uv run --frozen --no-dev --group release check-wheel-contents dist/*.whl

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  test:
    name: wheel smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          python-version: ${{ matrix.python-version }}

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Install wheel in an isolated environment
        run: |
          uv venv --python "${{ matrix.python-version }}" .smoke-venv
          uv pip install --python .smoke-venv/bin/python dist/*.whl
          uv pip check --python .smoke-venv/bin/python

      - name: Verify installed package metadata and import
        env:
          EXPECTED_VERSION: ${{ needs.build.outputs.version }}
        run: |
          .smoke-venv/bin/python -I -c \
            'import os; from importlib.metadata import version; import iperf3_lib; assert version("iperf3-lib") == os.environ["EXPECTED_VERSION"]'

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/iperf3-lib
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, test]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/iperf3-lib
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
