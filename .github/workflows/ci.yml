name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps & run checks
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install uv
          uv sync --dev
          make check

  docker-matrix-tests:
    runs-on: ubuntu-latest
    needs: lint-and-types
    strategy:
      matrix:
        python_base: ["python:3.12-slim", "python:3.13-slim"]
        iperf_version: ["3.18", "3.19.1", "3.20"]
    steps:
      - uses: actions/checkout@v4
      - name: Build docker test image
        run: |
          docker build \
            --build-arg PYTHON_BASE=${{ matrix.python_base }} \
            --build-arg IPERF3_VERSION=${{ matrix.iperf_version }} \
            -t py-iperf3-test:${{ matrix.python_base }}-${{ matrix.iperf_version }} .
      - name: Run tests in container
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" py-iperf3-test:${{ matrix.python_base }}-${{ matrix.iperf_version }} \
            bash -c "pytest -q --maxfail=1 --disable-warnings"
