name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run the full compatibility matrix monthly as a maintenance reminder.
    - cron: "17 9 1 * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: lint-and-types
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.31"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Synchronize frozen dependencies
        run: uv sync --frozen --dev

      - name: Run non-mutating checks
        run: make check

  docker-matrix-tests:
    name: docker (${{ matrix.python }}, iperf ${{ matrix.iperf }})
    runs-on: ubuntu-latest
    needs: lint-and-types
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
        iperf: ["3.19.1", "3.21"]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build compatibility image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: iperf3-lib-test:py${{ matrix.python }}-iperf${{ matrix.iperf }}
          build-args: |
            PYTHON_BASE=python:${{ matrix.python }}-slim
            IPERF3_VERSION=${{ matrix.iperf }}
          cache-from: type=gha,scope=py${{ matrix.python }}-iperf${{ matrix.iperf }}
          cache-to: type=gha,mode=max,scope=py${{ matrix.python }}-iperf${{ matrix.iperf }}

      - name: Run full test suite
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" \
            "iperf3-lib-test:py${{ matrix.python }}-iperf${{ matrix.iperf }}" \
            bash -c "python --version && iperf3 --version && pytest -vv --cov=iperf3_lib --cov-report=term-missing"

  python-preview:
    name: python 3.15 preview (allowed failure)
    runs-on: ubuntu-latest
    needs: lint-and-types
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build preview image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: iperf3-lib-test:py315-preview-iperf321
          build-args: |
            PYTHON_BASE=python:3.15-rc-slim
            IPERF3_VERSION=3.21
          cache-from: type=gha,scope=py315-preview-iperf321
          cache-to: type=gha,mode=max,scope=py315-preview-iperf321

      - name: Run preview suite
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" \
            iperf3-lib-test:py315-preview-iperf321 \
            bash -c "python --version && iperf3 --version && pytest -vv --cov=iperf3_lib --cov-report=term-missing"

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [lint-and-types, docker-matrix-tests]
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          LINT_RESULT: ${{ needs.lint-and-types.result }}
          TEST_RESULT: ${{ needs.docker-matrix-tests.result }}
        run: |
          test "$LINT_RESULT" = "success"
          test "$TEST_RESULT" = "success"
